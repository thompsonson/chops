<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>chops</title>
<link rel="stylesheet" href="styles.css">
</head>
<body>
  <div id="toasts" class="toast-container"></div>

  <header>
    <h1>chops</h1>
    <div class="status-row">
      <div class="status-item">
        <div class="dot" id="mqtt-dot"></div>
        <span id="mqtt-text">mqtt</span>
        <button class="ping-btn" id="btn-ping" title="Test MQTT connectivity" disabled>Ping</button>
      </div>
      <div class="status-item">
        <div class="dot" id="whisper-dot"></div>
        <span id="whisper-text">whisper</span>
      </div>
    </div>
    <button class="gear-btn" id="btn-settings" title="Settings">
      <svg viewBox="0 0 24 24"><path d="M19.14 12.94c.04-.3.06-.61.06-.94 0-.32-.02-.64-.07-.94l2.03-1.58a.49.49 0 00.12-.61l-1.92-3.32a.49.49 0 00-.59-.22l-2.39.96c-.5-.38-1.03-.7-1.62-.94l-.36-2.54a.484.484 0 00-.48-.41h-3.84c-.24 0-.43.17-.47.41l-.36 2.54c-.59.24-1.13.57-1.62.94l-2.39-.96a.49.49 0 00-.59.22L2.74 8.87c-.12.21-.08.47.12.61l2.03 1.58c-.05.3-.07.62-.07.94s.02.64.07.94l-2.03 1.58a.49.49 0 00-.12.61l1.92 3.32c.12.22.37.29.59.22l2.39-.96c.5.38 1.03.7 1.62.94l.36 2.54c.05.24.24.41.48.41h3.84c.24 0 .44-.17.47-.41l.36-2.54c.59-.24 1.13-.56 1.62-.94l2.39.96c.22.08.47 0 .59-.22l1.92-3.32c.12-.22.07-.47-.12-.61l-2.01-1.58zM12 15.6A3.6 3.6 0 1112 8.4a3.6 3.6 0 010 7.2z"/></svg>
    </button>
  </header>

  <!-- Tab bar -->
  <nav class="tab-bar">
    <button class="tab active" data-tab="commands">Commands</button>
    <button class="tab" data-tab="terminal">Terminal</button>
    <button class="tab" data-tab="messages">Messages</button>
  </nav>

  <!-- Commands tab -->
  <div class="tab-content active" id="tab-commands">
    <div class="model-banner" id="model-banner">
      Whisper model not found. Place <code>ggml-base.en.bin</code> in the app data directory.
      <span id="model-path"></span>
    </div>

    <div class="input-row">
      <button class="mic-btn" id="mic" title="Hold to record">
        <svg viewBox="0 0 24 24"><path d="M12 14c1.66 0 3-1.34 3-3V5c0-1.66-1.34-3-3-3S9 3.34 9 5v6c0 1.66 1.34 3 3 3zm-1-9c0-.55.45-1 1-1s1 .45 1 1v6c0 .55-.45 1-1 1s-1-.45-1-1V5zm6 6c0 2.76-2.24 5-5 5s-5-2.24-5-5H5c0 3.53 2.61 6.43 6 6.92V21h2v-3.08c3.39-.49 6-3.39 6-6.92h-2z"/></svg>
      </button>
      <input type="text" id="cmd" placeholder="run cargo test" autofocus>
      <button id="send" disabled>Send</button>
    </div>

    <!-- Transcription review popup (hidden by default) -->
    <div class="review-popup" id="review-popup">
      <textarea id="review-text" rows="3" placeholder="Transcription will appear here..."></textarea>
      <div class="review-buttons">
        <button class="btn-cancel" id="review-cancel">Cancel</button>
        <button id="review-send">Send</button>
      </div>
    </div>

    <!-- Conversation feed -->
    <div class="conversation" id="conversation">
      <div class="empty">No messages yet. Type a command or hold the mic to speak.</div>
    </div>
  </div>

  <!-- Terminal tab -->
  <div class="tab-content" id="tab-terminal">
    <div class="session-bar">
      <select id="session-select">
        <option value="">Loading sessions...</option>
      </select>
      <button class="session-btn" id="btn-start" title="Start session" disabled>Start</button>
      <button class="session-btn session-btn-stop" id="btn-stop" title="Stop session" disabled>Stop</button>
    </div>
    <div class="terminal-frame" id="terminal-frame">
      <iframe id="terminal-iframe" sandbox="allow-scripts allow-same-origin"></iframe>
    </div>
  </div>

  <!-- Messages tab -->
  <div class="tab-content" id="tab-messages">
    <div class="log" id="log">
      <div class="empty">No messages yet.</div>
    </div>
  </div>

  <!-- Settings modal -->
  <div class="modal-overlay" id="settings-overlay">
    <div class="modal">
      <h2>Settings</h2>
      <label for="set-host">MQTT Broker Host</label>
      <input type="text" id="set-host" placeholder="pop-mini.monkey-ladon.ts.net">
      <label for="set-wss-port">WebSocket Port (WSS)</label>
      <input type="number" id="set-wss-port" placeholder="9885">
      <label for="set-tcp-port">TCP Port (Rust backend)</label>
      <input type="number" id="set-tcp-port" placeholder="1884">
      <label for="set-api-port">Web API Port</label>
      <input type="number" id="set-api-port" placeholder="8443">
      <label for="set-ttyd-port">ttyd Port</label>
      <input type="number" id="set-ttyd-port" placeholder="7681">
      <label for="set-model-path">Whisper Model Path</label>
      <div class="browse-row">
        <input type="text" id="set-model-path" placeholder="ggml-base.en.bin">
        <button class="btn-browse" id="btn-browse-model">Browse</button>
      </div>
      <label for="set-update-channel">Update Channel</label>
      <select id="set-update-channel">
        <option value="stable">Stable (tagged releases)</option>
        <option value="dev">Dev (rolling main builds)</option>
      </select>
      <div style="margin-top: 0.5rem;">
        <button class="session-btn" id="btn-check-update" style="font-size: 0.8rem; padding: 0.4rem 0.8rem;">Check for Updates</button>
        <span id="update-status" style="font-size: 0.75rem; color: var(--muted); margin-left: 0.5rem;"></span>
      </div>
      <div class="modal-buttons">
        <button class="btn-cancel" id="settings-cancel">Cancel</button>
        <button id="settings-save">Save &amp; Reconnect</button>
      </div>
    </div>
  </div>

  <script type="module" src="js/app.js"></script>
</body>
</html>
