<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="stickGrad" x1="0" y1="0" x2="0.8" y2="1">
      <stop offset="0%" stop-color="#f0d9a0"/>
      <stop offset="100%" stop-color="#c89b6c"/>
    </linearGradient>
    <linearGradient id="bubbleGrad" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#5eead4"/>
      <stop offset="100%" stop-color="#3b82f6"/>
    </linearGradient>
  </defs>

  <!-- Dark background -->
  <rect width="512" height="512" rx="108" fill="#101830"/>

  <!-- Chat bubble being pinched by chopsticks -->
  <rect x="195" y="135" width="140" height="105" rx="24"
        fill="none" stroke="url(#bubbleGrad)" stroke-width="14"/>
  <!-- Bubble tail -->
  <path d="M 245,240 L 225,270 L 265,240"
        fill="none" stroke="url(#bubbleGrad)" stroke-width="14"
        stroke-linejoin="round" stroke-linecap="round"/>

  <!-- Three dots inside bubble (typing indicator) -->
  <circle cx="235" cy="188" r="10" fill="url(#bubbleGrad)" opacity="0.9"/>
  <circle cx="265" cy="188" r="10" fill="url(#bubbleGrad)" opacity="0.6"/>
  <circle cx="295" cy="188" r="10" fill="url(#bubbleGrad)" opacity="0.35"/>

  <!-- Left chopstick - comes from bottom-left, pinches the bubble -->
  <line x1="95" y1="420" x2="220" y2="148"
        stroke="url(#stickGrad)" stroke-width="16" stroke-linecap="round"/>

  <!-- Right chopstick - comes from bottom-right, pinches the bubble -->
  <line x1="175" y1="430" x2="310" y2="152"
        stroke="url(#stickGrad)" stroke-width="16" stroke-linecap="round"/>

  <!-- "chops" text -->
  <text x="360" y="415" text-anchor="middle"
        font-family="Georgia, 'Palatino Linotype', serif"
        font-weight="400" font-size="52" fill="url(#stickGrad)"
        letter-spacing="4" opacity="0.65">chops</text>
</svg>
