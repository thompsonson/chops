<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="stickGrad" x1="0.3" y1="0" x2="0.7" y2="1">
      <stop offset="0%" stop-color="#f0d9a0"/>
      <stop offset="100%" stop-color="#b8834a"/>
    </linearGradient>
    <linearGradient id="bubbleGrad" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#5eead4"/>
      <stop offset="100%" stop-color="#3b82f6"/>
    </linearGradient>
  </defs>

  <!-- Dark background -->
  <rect width="512" height="512" rx="108" fill="#101830"/>

  <!-- Chopsticks: V-shape, tips pinch the bubble tail from below -->
  <!-- Left chopstick -->
  <line x1="115" y1="430" x2="237" y2="228"
        stroke="url(#stickGrad)" stroke-width="14" stroke-linecap="round"/>
  <!-- Right chopstick -->
  <line x1="397" y1="430" x2="275" y2="228"
        stroke="url(#stickGrad)" stroke-width="14" stroke-linecap="round"/>

  <!-- Chat bubble with integrated tail - single path -->
  <path d="M 212,88
           L 300,88
           Q 328,88 328,116
           L 328,176
           Q 328,200 300,200
           L 278,200
           L 256,232
           L 234,200
           L 212,200
           Q 184,200 184,176
           L 184,116
           Q 184,88 212,88 Z"
        fill="#101830" stroke="url(#bubbleGrad)" stroke-width="14"
        stroke-linejoin="round"/>

  <!-- Typing dots inside bubble -->
  <circle cx="224" cy="148" r="11" fill="url(#bubbleGrad)" opacity="0.9"/>
  <circle cx="256" cy="148" r="11" fill="url(#bubbleGrad)" opacity="0.6"/>
  <circle cx="288" cy="148" r="11" fill="url(#bubbleGrad)" opacity="0.35"/>

  <!-- "chops" text between the chopstick handles -->
  <text x="256" y="400" text-anchor="middle"
        font-family="Georgia, 'Palatino Linotype', serif"
        font-weight="400" font-size="48" fill="url(#stickGrad)"
        letter-spacing="6" opacity="0.6">chops</text>
</svg>
