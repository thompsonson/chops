<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="glyphGrad" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#f0d9a0"/>
      <stop offset="100%" stop-color="#c89b6c"/>
    </linearGradient>
  </defs>

  <!-- Dark background -->
  <rect width="512" height="512" rx="108" fill="#101830"/>

  <!-- The Chops Glyph: decorative > chevron with scroll ends -->
  <!-- Upper arm with inward curl -->
  <path d="M 345,215
           C 285,178 205,135 155,112
           C 125,97 108,110 118,135
           C 128,160 155,145 145,122"
        fill="none" stroke="url(#glyphGrad)" stroke-width="18"
        stroke-linecap="round" stroke-linejoin="round"/>

  <!-- Lower arm with inward curl -->
  <path d="M 345,215
           C 285,252 205,295 155,318
           C 125,333 108,320 118,295
           C 128,270 155,285 145,308"
        fill="none" stroke="url(#glyphGrad)" stroke-width="18"
        stroke-linecap="round" stroke-linejoin="round"/>

  <!-- Sound dots emanating from the chevron point -->
  <circle cx="375" cy="215" r="8" fill="url(#glyphGrad)" opacity="0.75"/>
  <circle cx="400" cy="215" r="6" fill="url(#glyphGrad)" opacity="0.45"/>
  <circle cx="420" cy="215" r="4" fill="url(#glyphGrad)" opacity="0.2"/>

  <!-- "chops" text in serif to match Le Stash's style -->
  <text x="256" y="425" text-anchor="middle"
        font-family="Georgia, 'Palatino Linotype', 'Book Antiqua', serif"
        font-weight="400" font-size="56" fill="url(#glyphGrad)"
        letter-spacing="8" opacity="0.7">chops</text>
</svg>
