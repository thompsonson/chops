<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="stickGrad" x1="0.3" y1="0" x2="0.7" y2="1">
      <stop offset="0%" stop-color="#f0d9a0"/>
      <stop offset="100%" stop-color="#b8834a"/>
    </linearGradient>
    <linearGradient id="bubbleGrad" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#5eead4"/>
      <stop offset="100%" stop-color="#3b82f6"/>
    </linearGradient>
  </defs>

  <!-- Dark background -->
  <rect width="512" height="512" rx="108" fill="#101830"/>

  <!-- Crossed chopsticks behind bubble -->
  <!-- Stick A: lower-left to upper-right -->
  <line x1="130" y1="420" x2="365" y2="100"
        stroke="url(#stickGrad)" stroke-width="14" stroke-linecap="round"/>
  <!-- Stick B: lower-right to upper-left -->
  <line x1="382" y1="420" x2="147" y2="100"
        stroke="url(#stickGrad)" stroke-width="14" stroke-linecap="round"/>

  <!-- Chat bubble - sits on top of the crossing point -->
  <path d="M 212,100
           L 300,100
           Q 328,100 328,128
           L 328,184
           Q 328,208 300,208
           L 278,208
           L 256,240
           L 234,208
           L 212,208
           Q 184,208 184,184
           L 184,128
           Q 184,100 212,100 Z"
        fill="#101830" stroke="url(#bubbleGrad)" stroke-width="14"
        stroke-linejoin="round"/>

  <!-- Typing dots inside bubble -->
  <circle cx="224" cy="158" r="11" fill="url(#bubbleGrad)" opacity="0.9"/>
  <circle cx="256" cy="158" r="11" fill="url(#bubbleGrad)" opacity="0.6"/>
  <circle cx="288" cy="158" r="11" fill="url(#bubbleGrad)" opacity="0.35"/>

  <!-- "chops" text at bottom center -->
  <text x="256" y="395" text-anchor="middle"
        font-family="Georgia, 'Palatino Linotype', serif"
        font-weight="400" font-size="48" fill="url(#stickGrad)"
        letter-spacing="6" opacity="0.6">chops</text>
</svg>
