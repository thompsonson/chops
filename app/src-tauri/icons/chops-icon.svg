<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="bubbleGrad" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#5eead4"/>
      <stop offset="100%" stop-color="#3b82f6"/>
    </linearGradient>
    <linearGradient id="waveGrad" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#3b82f6"/>
      <stop offset="100%" stop-color="#5eead4" stop-opacity="0.3"/>
    </linearGradient>
  </defs>

  <!-- Dark rounded background -->
  <rect width="512" height="512" rx="108" fill="#0f1729"/>

  <!-- Speech bubble body -->
  <path d="M 140 130
           Q 140 105, 170 105
           L 370 105
           Q 400 105, 400 130
           L 400 280
           Q 400 305, 370 305
           L 230 305
           L 175 365
           L 190 305
           L 170 305
           Q 140 305, 140 280
           Z"
        fill="none" stroke="url(#bubbleGrad)" stroke-width="22"
        stroke-linejoin="round" stroke-linecap="round"/>

  <!-- Terminal prompt > -->
  <path d="M 195 175 L 245 210 L 195 245"
        fill="none" stroke="url(#bubbleGrad)" stroke-width="22"
        stroke-linecap="round" stroke-linejoin="round"/>

  <!-- Cursor _ -->
  <line x1="270" y1="245" x2="340" y2="245"
        stroke="url(#bubbleGrad)" stroke-width="22" stroke-linecap="round"/>

  <!-- Sound waves emanating from bubble -->
  <path d="M 410 165 Q 440 205, 410 245"
        fill="none" stroke="url(#waveGrad)" stroke-width="14"
        stroke-linecap="round" opacity="0.8"/>
  <path d="M 430 140 Q 475 205, 430 270"
        fill="none" stroke="url(#waveGrad)" stroke-width="12"
        stroke-linecap="round" opacity="0.5"/>
  <path d="M 450 118 Q 505 205, 450 292"
        fill="none" stroke="url(#waveGrad)" stroke-width="10"
        stroke-linecap="round" opacity="0.25"/>

  <!-- Subtle "chops" text at bottom -->
  <text x="256" y="430" text-anchor="middle"
        font-family="system-ui, -apple-system, sans-serif" font-weight="600"
        font-size="52" fill="#5eead4" opacity="0.6"
        letter-spacing="8">chops</text>
</svg>
