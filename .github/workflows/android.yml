name: Android Build

on:
  push:
    branches: [main]
    tags: ['v*']
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build-apk:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17

      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: aarch64-linux-android,x86_64-linux-android

      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: app/src-tauri

      - uses: actions/setup-node@v6
        with:
          node-version: 20

      - name: Install system dependencies
        run: sudo apt-get update && sudo apt-get install -y cmake libclang-dev

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Install Android NDK
        run: sdkmanager --install "ndk;27.2.12479018"

      - name: Set NDK environment
        run: |
          echo "NDK_HOME=$ANDROID_HOME/ndk/27.2.12479018" >> "$GITHUB_ENV"
          echo "ANDROID_NDK_HOME=$ANDROID_HOME/ndk/27.2.12479018" >> "$GITHUB_ENV"

      - name: Install npm dependencies
        run: npm ci
        working-directory: app

      - name: Initialize Tauri Android
        run: npx tauri android init
        working-directory: app

      - name: Decode keystore
        run: echo "${{ secrets.ANDROID_KEYSTORE }}" | base64 -d > /tmp/chops-release.jks

      - name: Build APK
        run: npx tauri android build --target aarch64 --target x86_64
        working-directory: app

      - name: Sign APK
        run: |
          APKSIGNER=$(find "$ANDROID_HOME/build-tools" -name apksigner | sort -V | tail -1)
          unsigned=$(find app/src-tauri/gen/android -name '*-unsigned.apk' | head -1)
          signed="${unsigned%-unsigned.apk}.apk"
          "$APKSIGNER" sign --ks /tmp/chops-release.jks --ks-pass pass:${{ secrets.ANDROID_KEYSTORE_PASSWORD }} --out "$signed" "$unsigned"
          "$APKSIGNER" verify "$signed"

      - name: Upload APK
        uses: actions/upload-artifact@v7
        with:
          name: chops-android
          path: app/src-tauri/gen/android/app/build/outputs/apk/**/*-release.apk
          if-no-files-found: error

      - name: Upload to Release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          files: app/src-tauri/gen/android/app/build/outputs/apk/**/*-release.apk

      - name: Update dev release
        if: github.ref == 'refs/heads/main'
        uses: softprops/action-gh-release@v2
        with:
          tag_name: dev
          name: Dev Build
          prerelease: true
          body: |
            Rolling development build from `main`.
            Updated on every push — install via [Obtainium](https://obtainium.imranr.dev/).
            Commit: ${{ github.sha }}
          files: app/src-tauri/gen/android/app/build/outputs/apk/**/*-release.apk
