name: Android Build

on:
  push:
    tags: ['v*']
  workflow_dispatch:

jobs:
  build-apk:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17

      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: aarch64-linux-android,armv7-linux-androideabi,x86_64-linux-android,i686-linux-android

      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: app/src-tauri

      - uses: actions/setup-node@v6
        with:
          node-version: 20

      - name: Install system dependencies
        run: sudo apt-get update && sudo apt-get install -y cmake libclang-dev

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Install Android NDK
        run: sdkmanager --install "ndk;27.2.12479018"

      - name: Set NDK environment
        run: |
          echo "NDK_HOME=$ANDROID_HOME/ndk/27.2.12479018" >> "$GITHUB_ENV"
          echo "ANDROID_NDK_HOME=$ANDROID_HOME/ndk/27.2.12479018" >> "$GITHUB_ENV"

      - name: Install npm dependencies
        run: npm ci
        working-directory: app

      - name: Initialize Tauri Android
        run: npx tauri android init
        working-directory: app

      - name: Set minSdk to 26 for AAudio support
        run: sed -i 's/minSdk = 24/minSdk = 26/' app/src-tauri/gen/android/app/build.gradle.kts

      - name: Build APK
        run: npx tauri android build
        working-directory: app

      - name: Upload APK
        uses: actions/upload-artifact@v7
        with:
          name: chops-android
          path: app/src-tauri/gen/android/app/build/outputs/apk/**/*.apk

      - name: Upload to Release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          files: app/src-tauri/gen/android/app/build/outputs/apk/**/*.apk
