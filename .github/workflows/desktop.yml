name: Desktop Build

on:
  push:
    branches: [main]
    tags: ['v*']
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build-desktop:
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: macos-latest
            artifact: chops-macos
          - os: ubuntu-latest
            artifact: chops-linux
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v6

      - uses: dtolnay/rust-toolchain@stable

      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: app/src-tauri

      - uses: actions/setup-node@v6
        with:
          node-version: 20

      - name: Install system dependencies (Linux)
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev \
            libgtk-3-dev \
            libayatana-appindicator3-dev \
            librsvg2-dev \
            cmake \
            libclang-dev \
            libasound2-dev

      - name: Install system dependencies (macOS)
        if: runner.os == 'macOS'
        run: brew install cmake

      # whisper.cpp ggml auto-detects i8mm on Apple Silicon but clang fails
      # to inline i8mm intrinsics without the right -march flag
      # whisper-rs-sys passes WHISPER_*/CMAKE_* env vars to cmake.
      # WHISPER_NATIVE=OFF: disable CPU feature auto-detect (avoids i8mm
      #   inline errors where clang can't inline i8mm intrinsics across
      #   target boundaries on Apple Silicon CI runners)
      # MACOSX_DEPLOYMENT_TARGET=11.0: required for std::filesystem in ggml
      - name: Set whisper-rs cmake flags (macOS)
        if: runner.os == 'macOS'
        run: |
          echo "MACOSX_DEPLOYMENT_TARGET=11.0" >> "$GITHUB_ENV"
          echo "WHISPER_NATIVE=OFF" >> "$GITHUB_ENV"

      - name: Install npm dependencies
        run: npm ci
        working-directory: app

      - name: Build Tauri app
        run: npx tauri build
        working-directory: app

      - name: Upload artifacts (macOS)
        if: runner.os == 'macOS'
        uses: actions/upload-artifact@v7
        with:
          name: ${{ matrix.artifact }}
          path: app/src-tauri/target/release/bundle/dmg/*.dmg
          if-no-files-found: error

      - name: Upload artifacts (Linux)
        if: runner.os == 'Linux'
        uses: actions/upload-artifact@v7
        with:
          name: ${{ matrix.artifact }}
          path: |
            app/src-tauri/target/release/bundle/appimage/*.AppImage
            app/src-tauri/target/release/bundle/deb/*.deb
          if-no-files-found: error

  release:
    needs: build-desktop
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/') || github.ref == 'refs/heads/main'
    steps:
      - uses: actions/download-artifact@v7
        with:
          path: artifacts

      - name: Upload to tagged release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          files: |
            artifacts/chops-macos/*.dmg
            artifacts/chops-linux/*.AppImage
            artifacts/chops-linux/*.deb

      - name: Set build timestamp
        if: github.ref == 'refs/heads/main'
        run: echo "BUILD_TIME=$(date -u '+%Y-%m-%d %H:%M UTC')" >> "$GITHUB_ENV"

      - name: Delete old dev-desktop release
        if: github.ref == 'refs/heads/main'
        run: gh release delete dev-desktop --yes --cleanup-tag 2>/dev/null || true
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GH_REPO: ${{ github.repository }}

      - name: Create dev-desktop release
        if: github.ref == 'refs/heads/main'
        run: |
          gh release create dev-desktop \
            --title "Dev Desktop Build — ${{ env.BUILD_TIME }} (${{ github.sha }})" \
            --prerelease \
            --notes "$(cat <<'EOF'
          Rolling desktop development build from `main`.

          **Built:** ${{ env.BUILD_TIME }}
          **Commit:** [`${{ github.sha }}`](${{ github.server_url }}/${{ github.repository }}/commit/${{ github.sha }})
          EOF
          )" \
            artifacts/chops-macos/*.dmg \
            artifacts/chops-linux/*.AppImage \
            artifacts/chops-linux/*.deb
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GH_REPO: ${{ github.repository }}
