name: Desktop Build

on:
  push:
    branches: [main]
    tags: ['v*']
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build-desktop:
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: macos-latest
            artifact: chops-macos-arm64
          - os: macos-13
            artifact: chops-macos-x86_64
          - os: ubuntu-latest
            artifact: chops-linux
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v7

      - uses: dtolnay/rust-toolchain@stable

      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: app/src-tauri

      - uses: actions/setup-node@v6
        with:
          node-version: 20

      - name: Install system dependencies (Linux)
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev \
            libgtk-3-dev \
            libayatana-appindicator3-dev \
            librsvg2-dev \
            cmake \
            libclang-dev \
            libasound2-dev

      - name: Install system dependencies (macOS)
        if: runner.os == 'macOS'
        run: brew install cmake

      # whisper.cpp ggml on macOS ARM CI:
      # 1. GGML_NATIVE auto-detects i8mm but Apple Clang can't inline
      #    vmmlaq_s32 across target boundaries → build error
      # 2. Default deployment target is 10.13 but std::filesystem needs 10.15+
      # whisper-rs-sys only passes WHISPER_*/CMAKE_* env vars to cmake, and
      # WHISPER_NATIVE=OFF doesn't propagate (cmake bug: falsy check skips it).
      # Fix: patch ggml cmake to disable NATIVE, set deployment target via cmake.
      - name: Patch whisper.cpp for macOS ARM CI
        if: runner.os == 'macOS'
        run: |
          echo "MACOSX_DEPLOYMENT_TARGET=11.0" >> "$GITHUB_ENV"
          echo "CMAKE_OSX_DEPLOYMENT_TARGET=11.0" >> "$GITHUB_ENV"
          # Pre-fetch whisper-rs-sys so we can patch it before the real build
          cd app && cargo fetch --manifest-path src-tauri/Cargo.toml
          # Disable GGML_NATIVE in ggml-cpu cmake (prevents i8mm auto-detection)
          find ~/.cargo/registry/src -path "*/whisper-rs-sys-*/whisper.cpp/ggml/src/ggml-cpu/CMakeLists.txt" \
            -exec sed -i '' 's/if (GGML_NATIVE)/if (FALSE) # patched for macOS CI/' {} \;

      - name: Install npm dependencies
        run: npm ci
        working-directory: app

      - name: Set dev version
        if: github.ref == 'refs/heads/main'
        run: |
          DEV_VERSION="0.1.0-dev.$(date -u +%Y%m%d%H%M)"
          jq --arg v "$DEV_VERSION" '.version = $v' src-tauri/tauri.conf.json > tmp.json && mv tmp.json src-tauri/tauri.conf.json
          echo "DEV_VERSION=${DEV_VERSION}" >> "$GITHUB_ENV"
        working-directory: app

      - name: Build Tauri app
        run: npx tauri build
        working-directory: app
        env:
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}

      - name: Upload artifacts (macOS)
        if: runner.os == 'macOS'
        uses: actions/upload-artifact@v7
        with:
          name: ${{ matrix.artifact }}
          path: |
            app/src-tauri/target/release/bundle/dmg/*.dmg
            app/src-tauri/target/release/bundle/macos/*.app.tar.gz
            app/src-tauri/target/release/bundle/macos/*.app.tar.gz.sig
          if-no-files-found: error

      - name: Upload artifacts (Linux)
        if: runner.os == 'Linux'
        uses: actions/upload-artifact@v7
        with:
          name: ${{ matrix.artifact }}
          path: |
            app/src-tauri/target/release/bundle/appimage/*.AppImage
            app/src-tauri/target/release/bundle/appimage/*.AppImage.sig
            app/src-tauri/target/release/bundle/deb/*.deb
          if-no-files-found: error

  release:
    needs: build-desktop
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/') || github.ref == 'refs/heads/main'
    steps:
      - uses: actions/download-artifact@v8
        with:
          path: artifacts

      - name: Collect release files
        run: |
          mkdir -p release-files
          # macOS ARM
          cp artifacts/chops-macos-arm64/chops.app.tar.gz release-files/chops-aarch64.app.tar.gz
          cp artifacts/chops-macos-arm64/chops.app.tar.gz.sig release-files/chops-aarch64.app.tar.gz.sig
          find artifacts/chops-macos-arm64 -name '*.dmg' -exec cp {} release-files/ \;
          # macOS Intel
          cp artifacts/chops-macos-x86_64/chops.app.tar.gz release-files/chops-x86_64.app.tar.gz
          cp artifacts/chops-macos-x86_64/chops.app.tar.gz.sig release-files/chops-x86_64.app.tar.gz.sig
          find artifacts/chops-macos-x86_64 -name '*.dmg' -exec cp {} release-files/ \;
          # Linux
          find artifacts/chops-linux -type f -exec cp {} release-files/ \;
          ls -la release-files/

      - name: Generate latest.json for updater
        run: |
          # Determine version from artifact filenames or git tag
          if [[ "$GITHUB_REF" == refs/tags/v* ]]; then
            VERSION="${GITHUB_REF#refs/tags/v}"
          else
            # Dev build — extract version from artifact name (e.g. chops_0.1.0-dev.20260412.1404_amd64.AppImage)
            VERSION=$(ls release-files/*.AppImage 2>/dev/null | head -1 | grep -oP '\d+\.\d+\.\d+-dev\.\d+' || echo "0.1.0-dev")
          fi
          echo "DEV_VERSION=${VERSION}" >> "$GITHUB_ENV"

          REPO_URL="https://github.com/${{ github.repository }}"
          PUB_DATE=$(date -u +"%Y-%m-%dT%H:%M:%SZ")

          # Determine release tag for download URLs
          if [[ "$GITHUB_REF" == refs/tags/* ]]; then
            TAG="${GITHUB_REF#refs/tags/}"
            DL_BASE="$REPO_URL/releases/download/$TAG"
          else
            DL_BASE="$REPO_URL/releases/download/v${VERSION}-desktop"
          fi

          # Read signatures
          LINUX_SIG=""
          LINUX_URL=""

          for f in release-files/*.AppImage.sig; do
            [ -f "$f" ] && LINUX_SIG=$(cat "$f")
            LINUX_BUNDLE=$(basename "${f%.sig}")
            LINUX_URL="$DL_BASE/$LINUX_BUNDLE"
          done

          # macOS ARM
          MACOS_ARM_SIG=""
          MACOS_ARM_URL=""
          if [ -f "release-files/chops-aarch64.app.tar.gz.sig" ]; then
            MACOS_ARM_SIG=$(cat release-files/chops-aarch64.app.tar.gz.sig)
            MACOS_ARM_URL="$DL_BASE/chops-aarch64.app.tar.gz"
          fi

          # macOS Intel
          MACOS_X64_SIG=""
          MACOS_X64_URL=""
          if [ -f "release-files/chops-x86_64.app.tar.gz.sig" ]; then
            MACOS_X64_SIG=$(cat release-files/chops-x86_64.app.tar.gz.sig)
            MACOS_X64_URL="$DL_BASE/chops-x86_64.app.tar.gz"
          fi

          # Build latest.json
          PLATFORMS="{}"
          if [ -n "$LINUX_SIG" ]; then
            PLATFORMS=$(echo "$PLATFORMS" | jq --arg url "$LINUX_URL" --arg sig "$LINUX_SIG" '. + {"linux-x86_64": {"url": $url, "signature": $sig}}')
          fi
          if [ -n "$MACOS_ARM_SIG" ]; then
            PLATFORMS=$(echo "$PLATFORMS" | jq --arg url "$MACOS_ARM_URL" --arg sig "$MACOS_ARM_SIG" '. + {"darwin-aarch64": {"url": $url, "signature": $sig}}')
          fi
          if [ -n "$MACOS_X64_SIG" ]; then
            PLATFORMS=$(echo "$PLATFORMS" | jq --arg url "$MACOS_X64_URL" --arg sig "$MACOS_X64_SIG" '. + {"darwin-x86_64": {"url": $url, "signature": $sig}}')
          fi

          jq -n \
            --arg version "$VERSION" \
            --arg notes "Release $VERSION" \
            --arg pub_date "$PUB_DATE" \
            --argjson platforms "$PLATFORMS" \
            '{version: $version, notes: $notes, pub_date: $pub_date, platforms: $platforms}' \
            > release-files/latest.json

          echo "Generated latest.json:"
          cat release-files/latest.json

      - name: Upload to tagged release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v3
        with:
          files: release-files/*

      - name: Delete old dev-desktop release
        if: github.ref == 'refs/heads/main'
        run: |
          OLD_TAG=$(gh release list --json tagName -q '[.[].tagName | select(test("^v0\\.1\\.0-dev\\..*-desktop$"))][0] // empty')
          if [ -n "$OLD_TAG" ]; then
            echo "Deleting old dev-desktop release: $OLD_TAG"
            gh release delete "$OLD_TAG" --yes --cleanup-tag
          fi
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GH_REPO: ${{ github.repository }}

      - name: Create dev-desktop release
        if: github.ref == 'refs/heads/main'
        run: |
          DEV_TAG="v${{ env.DEV_VERSION }}-desktop"
          gh release create "$DEV_TAG" \
            --title "Dev Desktop Build — ${DEV_TAG} (${{ github.sha }})" \
            --prerelease \
            --notes "$(cat <<EOF
          Rolling desktop development build from \`main\`.

          **Version:** \`${{ env.DEV_VERSION }}\`
          **Commit:** [\`${{ github.sha }}\`](${{ github.server_url }}/${{ github.repository }}/commit/${{ github.sha }})
          EOF
          )" \
            release-files/*
          gh release edit "$DEV_TAG" --draft=false
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GH_REPO: ${{ github.repository }}
