name: Desktop Build

on:
  push:
    branches: [main]
    tags: ['v*']
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build-desktop:
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: macos-latest
            artifact: chops-macos
          - os: ubuntu-latest
            artifact: chops-linux
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v6

      - uses: dtolnay/rust-toolchain@stable

      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: app/src-tauri

      - uses: actions/setup-node@v6
        with:
          node-version: 20

      - name: Install system dependencies (Linux)
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev \
            libgtk-3-dev \
            libayatana-appindicator3-dev \
            librsvg2-dev \
            cmake \
            libclang-dev \
            libasound2-dev

      - name: Install system dependencies (macOS)
        if: runner.os == 'macOS'
        run: brew install cmake

      # whisper.cpp ggml on macOS ARM CI:
      # 1. GGML_NATIVE auto-detects i8mm but Apple Clang can't inline
      #    vmmlaq_s32 across target boundaries → build error
      # 2. Default deployment target is 10.13 but std::filesystem needs 10.15+
      # whisper-rs-sys only passes WHISPER_*/CMAKE_* env vars to cmake, and
      # WHISPER_NATIVE=OFF doesn't propagate (cmake bug: falsy check skips it).
      # Fix: patch ggml cmake to disable NATIVE, set deployment target via cmake.
      - name: Patch whisper.cpp for macOS ARM CI
        if: runner.os == 'macOS'
        run: |
          echo "MACOSX_DEPLOYMENT_TARGET=11.0" >> "$GITHUB_ENV"
          echo "CMAKE_OSX_DEPLOYMENT_TARGET=11.0" >> "$GITHUB_ENV"
          # Pre-fetch whisper-rs-sys so we can patch it before the real build
          cd app && cargo fetch --manifest-path src-tauri/Cargo.toml
          # Disable GGML_NATIVE in ggml-cpu cmake (prevents i8mm auto-detection)
          find ~/.cargo/registry/src -path "*/whisper-rs-sys-*/whisper.cpp/ggml/src/ggml-cpu/CMakeLists.txt" \
            -exec sed -i '' 's/if (GGML_NATIVE)/if (FALSE) # patched for macOS CI/' {} \;

      - name: Install npm dependencies
        run: npm ci
        working-directory: app

      - name: Set dev version
        if: github.ref == 'refs/heads/main'
        run: |
          DEV_VERSION="0.1.0-dev.$(date -u +%Y%m%d%H%M%S)"
          jq --arg v "$DEV_VERSION" '.version = $v' src-tauri/tauri.conf.json > tmp.json && mv tmp.json src-tauri/tauri.conf.json
        working-directory: app

      - name: Build Tauri app
        run: npx tauri build
        working-directory: app
        env:
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}

      - name: Upload artifacts (macOS)
        if: runner.os == 'macOS'
        uses: actions/upload-artifact@v7
        with:
          name: ${{ matrix.artifact }}
          path: |
            app/src-tauri/target/release/bundle/dmg/*.dmg
            app/src-tauri/target/release/bundle/macos/*.app.tar.gz
            app/src-tauri/target/release/bundle/macos/*.app.tar.gz.sig
          if-no-files-found: error

      - name: Upload artifacts (Linux)
        if: runner.os == 'Linux'
        uses: actions/upload-artifact@v7
        with:
          name: ${{ matrix.artifact }}
          path: |
            app/src-tauri/target/release/bundle/appimage/*.AppImage
            app/src-tauri/target/release/bundle/appimage/*.AppImage.sig
            app/src-tauri/target/release/bundle/deb/*.deb
          if-no-files-found: error

  release:
    needs: build-desktop
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/') || github.ref == 'refs/heads/main'
    steps:
      - uses: actions/download-artifact@v7
        with:
          path: artifacts

      - name: Collect release files
        run: |
          mkdir -p release-files
          find artifacts -type f \( -name '*.dmg' -o -name '*.AppImage' -o -name '*.AppImage.sig' -o -name '*.app.tar.gz' -o -name '*.app.tar.gz.sig' -o -name '*.deb' \) | \
            xargs -I{} cp {} release-files/
          ls -la release-files/

      - name: Generate latest.json for updater
        run: |
          # Determine version from artifact filenames or git tag
          if [[ "$GITHUB_REF" == refs/tags/v* ]]; then
            VERSION="${GITHUB_REF#refs/tags/v}"
          else
            # Dev build — extract version from artifact name
            VERSION=$(ls release-files/*.AppImage 2>/dev/null | head -1 | grep -oP '\d+\.\d+\.\d+-dev\.\d+' || echo "0.1.0-dev")
          fi

          REPO_URL="https://github.com/${{ github.repository }}"
          PUB_DATE=$(date -u +"%Y-%m-%dT%H:%M:%SZ")

          # Determine release tag for download URLs
          if [[ "$GITHUB_REF" == refs/tags/* ]]; then
            TAG="${GITHUB_REF#refs/tags/}"
            DL_BASE="$REPO_URL/releases/download/$TAG"
          else
            DL_BASE="$REPO_URL/releases/download/dev-desktop"
          fi

          # Read signatures
          LINUX_SIG=""
          MACOS_SIG=""
          LINUX_URL=""
          MACOS_URL=""

          for f in release-files/*.AppImage.sig; do
            [ -f "$f" ] && LINUX_SIG=$(cat "$f")
            LINUX_BUNDLE=$(basename "${f%.sig}")
            LINUX_URL="$DL_BASE/$LINUX_BUNDLE"
          done

          for f in release-files/*.app.tar.gz.sig; do
            [ -f "$f" ] && MACOS_SIG=$(cat "$f")
            MACOS_BUNDLE=$(basename "${f%.sig}")
            MACOS_URL="$DL_BASE/$MACOS_BUNDLE"
          done

          # Build latest.json
          PLATFORMS="{}"
          if [ -n "$LINUX_SIG" ]; then
            PLATFORMS=$(echo "$PLATFORMS" | jq --arg url "$LINUX_URL" --arg sig "$LINUX_SIG" '. + {"linux-x86_64": {"url": $url, "signature": $sig}}')
          fi
          if [ -n "$MACOS_SIG" ]; then
            PLATFORMS=$(echo "$PLATFORMS" | jq --arg url "$MACOS_URL" --arg sig "$MACOS_SIG" '. + {"darwin-aarch64": {"url": $url, "signature": $sig}}')
          fi

          jq -n \
            --arg version "$VERSION" \
            --arg notes "Release $VERSION" \
            --arg pub_date "$PUB_DATE" \
            --argjson platforms "$PLATFORMS" \
            '{version: $version, notes: $notes, pub_date: $pub_date, platforms: $platforms}' \
            > release-files/latest.json

          echo "Generated latest.json:"
          cat release-files/latest.json

      - name: Upload to tagged release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          files: release-files/*

      - name: Set build timestamp
        if: github.ref == 'refs/heads/main'
        run: echo "BUILD_TIME=$(date -u '+%Y-%m-%d %H:%M UTC')" >> "$GITHUB_ENV"

      - name: Delete old dev-desktop release
        if: github.ref == 'refs/heads/main'
        run: gh release delete dev-desktop --yes --cleanup-tag 2>/dev/null || true
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GH_REPO: ${{ github.repository }}

      - name: Create dev-desktop release
        if: github.ref == 'refs/heads/main'
        run: |
          gh release create dev-desktop \
            --title "Dev Desktop Build — ${{ env.BUILD_TIME }} (${{ github.sha }})" \
            --prerelease \
            --notes "$(cat <<'EOF'
          Rolling desktop development build from `main`.

          **Built:** ${{ env.BUILD_TIME }}
          **Commit:** [`${{ github.sha }}`](${{ github.server_url }}/${{ github.repository }}/commit/${{ github.sha }})
          EOF
          )" \
            release-files/*
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GH_REPO: ${{ github.repository }}
