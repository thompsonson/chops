<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>chops</title>
<link rel="manifest" href="/manifest.json">
<meta name="theme-color" content="#1a1a2e">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<script src="https://unpkg.com/mqtt@5/dist/mqtt.min.js"></script>
<style>
  :root {
    --bg: #1a1a2e;
    --surface: #16213e;
    --border: #0f3460;
    --text: #e0e0e0;
    --muted: #888;
    --accent: #e94560;
    --ok: #4ecca3;
    --error: #e94560;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    font-family: 'SF Mono', 'Fira Code', 'Consolas', monospace;
    background: var(--bg);
    color: var(--text);
    height: 100vh;
    display: flex;
    flex-direction: column;
    padding: 1rem;
    max-width: 1400px;
    margin: 0 auto;
  }
  header {
    display: flex;
    align-items: center;
    gap: 0.75rem;
    margin-bottom: 0.75rem;
    padding-bottom: 0.5rem;
    border-bottom: 1px solid var(--border);
  }
  header h1 { font-size: 1.25rem; font-weight: 600; }
  .status {
    width: 10px; height: 10px;
    border-radius: 50%;
    background: var(--error);
    transition: background 0.3s;
  }
  .status.connected { background: var(--ok); }
  .status-text { font-size: 0.75rem; color: var(--muted); }
  .input-row {
    display: flex;
    gap: 0.5rem;
    margin-bottom: 0.75rem;
  }
  input[type="text"] {
    flex: 1;
    padding: 0.6rem 0.8rem;
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 6px;
    color: var(--text);
    font-family: inherit;
    font-size: 0.9rem;
    outline: none;
  }
  input[type="text"]:focus { border-color: var(--accent); }
  input[type="text"]::placeholder { color: var(--muted); }
  button {
    padding: 0.6rem 1.2rem;
    background: var(--accent);
    color: white;
    border: none;
    border-radius: 6px;
    cursor: pointer;
    font-family: inherit;
    font-size: 0.9rem;
    font-weight: 500;
  }
  button:hover { opacity: 0.9; }
  button:disabled { opacity: 0.4; cursor: not-allowed; }

  /* Mic button */
  .mic-btn {
    width: 40px;
    height: 40px;
    padding: 0;
    border-radius: 50%;
    background: var(--surface);
    border: 1px solid var(--border);
    display: flex;
    align-items: center;
    justify-content: center;
    flex-shrink: 0;
  }
  .mic-btn svg { fill: var(--muted); width: 18px; height: 18px; }
  .mic-btn:hover svg { fill: var(--text); }
  .mic-btn.recording {
    background: var(--accent);
    border-color: var(--accent);
    animation: pulse 1.5s infinite;
  }
  .mic-btn.recording svg { fill: white; }
  .mic-btn.unsupported { display: none; }
  @keyframes pulse {
    0%, 100% { box-shadow: 0 0 0 0 rgba(233,69,96,0.4); }
    50% { box-shadow: 0 0 0 8px rgba(233,69,96,0); }
  }

  /* Session selector */
  .session-bar {
    display: flex;
    gap: 0.5rem;
    align-items: center;
    margin-bottom: 0.5rem;
  }
  select {
    flex: 1;
    padding: 0.4rem 0.6rem;
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 6px;
    color: var(--text);
    font-family: inherit;
    font-size: 0.8rem;
    outline: none;
    cursor: pointer;
  }
  select:focus { border-color: var(--accent); }
  select option { background: var(--surface); color: var(--text); }
  select optgroup { color: var(--muted); font-style: normal; }
  .session-btn {
    padding: 0.4rem 0.8rem;
    font-size: 0.75rem;
    border-radius: 6px;
    background: var(--ok);
    color: var(--bg);
    border: none;
    cursor: pointer;
    font-family: inherit;
    font-weight: 500;
    white-space: nowrap;
  }
  .session-btn:hover { opacity: 0.9; }
  .session-btn:disabled { opacity: 0.3; cursor: not-allowed; }
  .session-btn-stop { background: var(--error); color: white; }

  /* Terminal (top, main content) */
  .terminal-frame {
    flex: 1;
    border: 1px solid var(--border);
    border-radius: 6px;
    overflow: hidden;
    min-height: 200px;
  }
  .terminal-frame iframe {
    width: 100%;
    height: 100%;
    border: none;
    background: var(--bg);
  }

  /* Debug log (collapsible) */
  details.debug-panel {
    margin-top: 0.5rem;
  }
  details.debug-panel summary {
    font-size: 0.7rem;
    color: var(--muted);
    cursor: pointer;
    user-select: none;
    text-transform: uppercase;
    letter-spacing: 0.05em;
    padding: 0.25rem 0;
  }
  details.debug-panel summary:hover { color: var(--text); }
  .log {
    overflow-y: auto;
    max-height: 200px;
    border: 1px solid var(--border);
    border-radius: 6px;
    background: var(--surface);
    padding: 0.5rem;
    margin-top: 0.35rem;
  }
  .log-entry {
    padding: 0.3rem 0.4rem;
    border-bottom: 1px solid var(--border);
    font-size: 0.75rem;
    line-height: 1.4;
  }
  .log-entry:last-child { border-bottom: none; }
  .log-entry .time { color: var(--muted); margin-right: 0.5rem; }
  .log-entry .topic { color: var(--accent); margin-right: 0.5rem; }
  .log-entry.ok .badge { color: var(--ok); }
  .log-entry.error .badge { color: var(--error); }
  .log-entry.sent { opacity: 0.7; }
  .log-entry.sent .badge { color: var(--muted); }
  .empty { color: var(--muted); text-align: center; padding: 1rem; font-size: 0.8rem; }

  .help {
    margin-top: 0.5rem;
    font-size: 0.65rem;
    color: var(--muted);
    line-height: 1.6;
  }

  .debug-config { font-size: 0.7rem; color: var(--muted); padding: 0.35rem 0; line-height: 1.6; }
  .debug-actions { display: flex; gap: 0.35rem; margin: 0.35rem 0; }

  /* Toast notifications */
  .toast-container {
    position: fixed;
    top: 1rem;
    right: 1rem;
    z-index: 200;
    display: flex;
    flex-direction: column;
    gap: 0.5rem;
    pointer-events: none;
    max-width: 360px;
  }
  .toast {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 6px;
    padding: 0.6rem 0.8rem;
    font-size: 0.8rem;
    line-height: 1.4;
    pointer-events: auto;
    animation: toast-in-out 4s ease forwards;
    border-left: 3px solid var(--muted);
  }
  .toast.toast-info { border-left-color: var(--ok); }
  .toast.toast-ok { border-left-color: var(--ok); }
  .toast.toast-warn { border-left-color: #f0c040; }
  .toast.toast-error { border-left-color: var(--error); }
  @keyframes toast-in-out {
    0% { opacity: 0; transform: translateX(20px); }
    5% { opacity: 1; transform: translateX(0); }
    90% { opacity: 1; }
    100% { opacity: 0; }
  }

  /* Escalation banner */
  .escalation-banner {
    background: #2a0a0a;
    border: 1px solid var(--error);
    border-radius: 6px;
    padding: 0.6rem 0.8rem;
    margin-bottom: 0.5rem;
    font-size: 0.8rem;
    color: var(--error);
    display: none;
    position: relative;
  }
  .escalation-banner.visible { display: block; }
  .escalation-banner .dismiss {
    position: absolute;
    top: 0.3rem;
    right: 0.5rem;
    background: none;
    border: none;
    color: var(--error);
    font-size: 1rem;
    cursor: pointer;
    padding: 0.2rem;
  }

  /* Workflow progress panel */
  .workflow-panel {
    margin-bottom: 0.5rem;
    font-size: 0.75rem;
  }
  .workflow-panel:empty { display: none; }
  .workflow-run {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 6px;
    padding: 0.5rem 0.7rem;
    margin-bottom: 0.35rem;
  }
  .workflow-run .wf-title {
    font-weight: 600;
    margin-bottom: 0.3rem;
    color: var(--text);
  }
  .workflow-step {
    display: flex;
    align-items: center;
    gap: 0.4rem;
    padding: 0.15rem 0;
    color: var(--muted);
  }
  .workflow-step .step-icon { width: 1em; text-align: center; }
  .workflow-step.pass { color: var(--ok); }
  .workflow-step.fail { color: var(--error); }
  .workflow-step.running { color: var(--text); }
  .wf-summary {
    margin-top: 0.3rem;
    padding-top: 0.3rem;
    border-top: 1px solid var(--border);
    font-weight: 500;
  }
  .wf-summary.success { color: var(--ok); }
  .wf-summary.failed { color: var(--error); }
</style>
</head>
<body>
  <div id="toasts" class="toast-container"></div>
  <header>
    <h1>chops</h1>
    <div class="status" id="status"></div>
    <span class="status-text" id="status-text">disconnected</span>
  </header>

  <div class="input-row">
    <input type="text" id="cmd" placeholder="run cargo test" autofocus>
    <button class="mic-btn" id="mic" title="Voice input">
      <svg viewBox="0 0 24 24"><path d="M12 14c1.66 0 3-1.34 3-3V5c0-1.66-1.34-3-3-3S9 3.34 9 5v6c0 1.66 1.34 3 3 3zm-1-9c0-.55.45-1 1-1s1 .45 1 1v6c0 .55-.45 1-1 1s-1-.45-1-1V5zm6 6c0 2.76-2.24 5-5 5s-5-2.24-5-5H5c0 3.53 2.61 6.43 6 6.92V21h2v-3.08c3.39-.49 6-3.39 6-6.92h-2z"/></svg>
    </button>
    <button id="send" disabled>Send</button>
  </div>

  <div class="session-bar">
    <select id="session-select">
      <option value="">Loading sessions...</option>
    </select>
    <button class="session-btn" id="btn-start" title="Start session" disabled>Start</button>
    <button class="session-btn session-btn-stop" id="btn-stop" title="Stop session" disabled>Stop</button>
    <button class="session-btn" id="btn-send" title="Send message to agent pane" disabled style="background:var(--surface);color:var(--text);">Send</button>
  </div>

  <div class="escalation-banner" id="escalation-banner">
    <button class="dismiss" onclick="dismissEscalation()">&times;</button>
    <strong>ESCALATION:</strong> <span id="escalation-text"></span>
  </div>
  <div class="workflow-panel" id="workflow-panel"></div>

  <div class="terminal-frame" id="terminal-frame">
    <iframe id="terminal-iframe" sandbox="allow-scripts allow-same-origin"></iframe>
  </div>

  <details class="debug-panel">
    <summary>Debug</summary>
    <div class="debug-config" id="debug-config"></div>
    <div class="debug-actions">
      <button class="session-btn" id="debug-test-mqtt" style="font-size:0.7rem;">Test MQTT WS</button>
      <button class="session-btn" id="debug-test-api" style="font-size:0.7rem;">Test API</button>
    </div>
    <div class="log" id="log">
      <div class="empty">No messages yet.</div>
    </div>
  </details>

  <!-- Session send popup -->
  <div class="modal-overlay" id="session-send-overlay" style="display:none;position:fixed;inset:0;background:rgba(0,0,0,0.6);z-index:100;align-items:center;justify-content:center;padding:1rem;">
    <div class="modal" style="background:var(--surface);border:1px solid var(--border);border-radius:8px;padding:1.5rem;width:100%;max-width:400px;">
      <h2 style="font-size:1rem;margin-bottom:1rem;font-weight:600;">Send to <span id="session-send-target"></span></h2>
      <textarea id="session-send-text" rows="4" placeholder="Type a message for the agent..." style="width:100%;background:var(--bg);border:1px solid var(--border);border-radius:6px;color:var(--text);font-family:inherit;font-size:0.9rem;padding:0.5rem;resize:vertical;outline:none;box-sizing:border-box;"></textarea>
      <div style="display:flex;gap:0.5rem;justify-content:flex-end;margin-top:1rem;">
        <button class="btn-cancel" id="session-send-cancel" style="padding:0.5rem 1rem;font-size:0.8rem;background:var(--surface);color:var(--text);border:1px solid var(--border);border-radius:6px;cursor:pointer;">Cancel</button>
        <button id="session-send-ok" style="padding:0.5rem 1rem;font-size:0.8rem;background:var(--ok);color:var(--bg);border:none;border-radius:6px;cursor:pointer;font-weight:500;">Send</button>
      </div>
    </div>
  </div>

  <div class="help">
    <strong>Commands:</strong>
    in &lt;project&gt; run &lt;command&gt; &nbsp;|&nbsp;
    in &lt;project&gt; tell claude &lt;message&gt; ... over &nbsp;|&nbsp;
    run &lt;command&gt; &nbsp;|&nbsp;
    open vscode &lt;file&gt;
    &nbsp;&nbsp;|&nbsp;&nbsp;
    <strong>Mic:</strong> click to speak, say "over" when done
  </div>

<script>
const MQTT_WS_PORT = window.location.protocol === 'https:' ? 9885 : 9884;
const MQTT_WS_PROTO = window.location.protocol === 'https:' ? 'wss' : 'ws';
const TTYD_PORT = 7681;
const TOPIC_TRANSCRIPTIONS = 'voice/transcriptions';
const TOPIC_RESPONSES = 'agent/responses';
const TOPIC_STATUS = 'plugins/status/#';
const TOPIC_COMMANDS = 'agent/commands/#';
const TOPIC_WORKFLOW_EVENTS = 'agent/workflow/events';
const TOPIC_WORKFLOW_ESCALATION = 'agent/workflow/escalation';
const TOPIC_INTENT_RESPONSE = 'agent/intent/response';

const statusEl = document.getElementById('status');
const statusText = document.getElementById('status-text');
const cmdEl = document.getElementById('cmd');
const sendBtn = document.getElementById('send');
const logEl = document.getElementById('log');
const micBtn = document.getElementById('mic');
const terminalIframe = document.getElementById('terminal-iframe');

let client = null;
let firstMessage = true;

// --- MQTT ---

function connect() {
  const host = window.location.hostname || 'localhost';
  const url = `${MQTT_WS_PROTO}://${host}:${MQTT_WS_PORT}`;

  // Set ttyd iframe source (match page protocol)
  const pageProto = window.location.protocol === 'https:' ? 'https' : 'http';
  terminalIframe.src = `${pageProto}://${host}:${TTYD_PORT}`;

  client = mqtt.connect(url, {
    clientId: `chops-web-${Math.random().toString(36).slice(2, 8)}`,
    keepalive: 30,
    reconnectPeriod: 3000,
  });

  client.on('connect', () => {
    statusEl.classList.add('connected');
    statusText.textContent = 'connected';
    sendBtn.disabled = false;

    client.subscribe(TOPIC_RESPONSES);
    client.subscribe(TOPIC_STATUS);
    client.subscribe(TOPIC_COMMANDS);
    client.subscribe(TOPIC_WORKFLOW_EVENTS);
    client.subscribe(TOPIC_WORKFLOW_ESCALATION);
    client.subscribe(TOPIC_INTENT_RESPONSE);
  });

  client.on('close', () => {
    statusEl.classList.remove('connected');
    statusText.textContent = 'disconnected';
    sendBtn.disabled = true;
  });

  client.on('error', (err) => {
    statusEl.classList.remove('connected');
    statusText.textContent = 'error';
    appendLog(createLogEntry('error', 'mqtt', `Error: ${err.message || err}`));
    if (err.message && err.message.includes('reset by peer')) {
      showToast(`MQTT connection reset — check mosquitto on ${MQTT_WS_PORT}`, 'error');
    }
  });

  client.on('message', (topic, payload) => {
    const text = payload.toString();
    let entry;

    if (topic === TOPIC_RESPONSES || topic === 'agent/responses') {
      try {
        const msg = JSON.parse(text);
        if (msg.type) {
          // New response protocol
          if (msg.type === 'toast') {
            showToast(msg.message, msg.level);
          }
          entry = createLogEntry(msg.level === 'error' ? 'error' : 'ok', msg.source || 'agent', msg.message);
        } else {
          // Legacy plugin-runner response
          const isOk = msg.status === 'ok';
          entry = createLogEntry(
            isOk ? 'ok' : 'error',
            msg.topic || topic,
            isOk ? (msg.output || 'ok') : (msg.error || 'error')
          );
        }
      } catch {
        entry = createLogEntry('ok', topic, text);
      }
    } else if (topic === TOPIC_WORKFLOW_EVENTS) {
      try {
        const event = JSON.parse(text);
        updateWorkflowPanel(event);
        entry = createLogEntry('ok', 'workflow', `${event.workflow}: ${event.type} ${event.step || ''}`);
      } catch {
        entry = createLogEntry('ok', topic, text);
      }
    } else if (topic === TOPIC_WORKFLOW_ESCALATION) {
      try {
        const esc = JSON.parse(text);
        showEscalation(esc);
        entry = createLogEntry('error', 'escalation', `${esc.workflow}/${esc.step}: ${esc.feedback}`);
      } catch {
        entry = createLogEntry('error', topic, text);
      }
    } else if (topic === TOPIC_INTENT_RESPONSE) {
      try {
        const resp = JSON.parse(text);
        if (resp.status === 'success') {
          showToast(`Running ${resp.intent?.workflow || 'workflow'}...`, 'info');
          entry = createLogEntry('ok', 'intent', `Running: ${resp.intent?.workflow || '?'}`);
        } else if (resp.status === 'failed') {
          showToast("Didn't understand that", 'warn');
          entry = createLogEntry('error', 'intent', resp.error || 'failed');
        } else if (resp.status === 'escalated') {
          showToast(`Rejected: ${resp.error}`, 'error');
          entry = createLogEntry('error', 'intent', `Rejected: ${resp.error}`);
        }
      } catch {
        entry = createLogEntry('ok', topic, text);
      }
    } else if (topic.startsWith('plugins/status/')) {
      entry = createLogEntry('ok', topic, text);
    } else if (topic.startsWith('agent/commands/')) {
      entry = createLogEntry('ok', topic, text);
    }

    if (entry) appendLog(entry);
  });
}

function sendCommand() {
  let text = cmdEl.value.trim();
  if (!text || !client) return;

  // Auto-prepend session context if not already specified.
  // "run X" → "in <session> run X", "tell claude X" → "in <session> tell claude X"
  // Skip if text already starts with "in " or is a non-session command (vscode, termux).
  const session = sessionSelect.value;
  const lower = text.toLowerCase();
  if (session && !session.startsWith('project:')
      && !lower.startsWith('in ')
      && !lower.includes('vscode') && !lower.includes('editor')
      && !lower.includes('termux') && !lower.includes('terminal')) {
    text = `in ${session} ${text}`;
  }

  // Auto-append terminator for "tell claude" text input so it flushes immediately
  if (/tell claude/i.test(text) && !/\b(over|done|send it|finish|end)\s*$/i.test(text)) {
    text += ' over';
  }

  const payload = JSON.stringify({
    text: text,
    is_final: true,
    timestamp: new Date().toISOString()
  });

  client.publish(TOPIC_TRANSCRIPTIONS, payload);
  appendLog(createLogEntry('sent', 'sent', text));
  cmdEl.value = '';
  cmdEl.focus();
}

function createLogEntry(type, topic, content) {
  const div = document.createElement('div');
  div.className = `log-entry ${type}`;

  const now = new Date().toLocaleTimeString('en-GB', { hour12: false });
  const shortTopic = topic.replace('agent/commands/', '').replace('agent/', '').replace('plugins/status/', 'status/');

  div.innerHTML = `<span class="time">${now}</span><span class="badge">[${type}]</span> <span class="topic">${shortTopic}</span> ${escapeHtml(content)}`;
  return div;
}

function appendLog(entry) {
  if (firstMessage) {
    logEl.innerHTML = '';
    firstMessage = false;
  }
  logEl.appendChild(entry);
  logEl.scrollTop = logEl.scrollHeight;
}

function escapeHtml(str) {
  const div = document.createElement('div');
  div.textContent = str;
  return div.innerHTML;
}

// --- Toast notifications ---

const toastsEl = document.getElementById('toasts');

function showToast(message, level) {
  const el = document.createElement('div');
  el.className = `toast toast-${level || 'info'}`;
  el.textContent = message;
  while (toastsEl.children.length >= 5) {
    toastsEl.removeChild(toastsEl.firstChild);
  }
  toastsEl.appendChild(el);
  el.addEventListener('animationend', () => el.remove());
}

// --- Debug panel ---

function renderDebugConfig() {
  const el = document.getElementById('debug-config');
  const host = window.location.hostname || 'localhost';
  const proto = window.location.protocol;
  el.innerHTML = `
host: ${host}
protocol: ${proto}
mqtt ws: ${MQTT_WS_PROTO}://${host}:${MQTT_WS_PORT}/mqtt
api: ${proto}//${host}/api/sessions
ttyd: ${proto === 'https:' ? 'https' : 'http'}://${host}:${TTYD_PORT}
  `.trim().replace(/\n/g, '<br>');
}

document.getElementById('debug-test-mqtt').addEventListener('click', () => {
  const host = window.location.hostname || 'localhost';
  const url = `${MQTT_WS_PROTO}://${host}:${MQTT_WS_PORT}`;
  appendLog(createLogEntry('ok', 'debug', `Testing MQTT WS: ${url} ...`));
  const ws = new WebSocket(url);
  ws.onopen = () => {
    appendLog(createLogEntry('ok', 'debug', 'MQTT WebSocket opened OK'));
    ws.close();
  };
  ws.onerror = () => {
    appendLog(createLogEntry('error', 'debug', 'MQTT WS error — check mosquitto on ' + MQTT_WS_PORT));
    showToast('MQTT WebSocket test failed', 'error');
  };
  ws.onclose = (e) => {
    if (e.code !== 1000) {
      appendLog(createLogEntry('error', 'debug', `MQTT WS closed: code=${e.code} reason=${e.reason}`));
    }
  };
  setTimeout(() => {
    if (ws.readyState !== ws.OPEN && ws.readyState !== ws.CLOSED) {
      ws.close();
      appendLog(createLogEntry('error', 'debug', 'MQTT WS timeout (5s)'));
    }
  }, 5000);
});

document.getElementById('debug-test-api').addEventListener('click', async () => {
  appendLog(createLogEntry('ok', 'debug', 'Testing /api/sessions ...'));
  try {
    const resp = await fetch('/api/sessions');
    const data = await resp.json();
    appendLog(createLogEntry('ok', 'debug', `API OK (${resp.status}): ${JSON.stringify(data).slice(0, 200)}`));
  } catch (e) {
    const detail = e.message?.includes('Failed to fetch')
      ? ' — CORS, TLS cert not trusted, or not connected to Tailscale'
      : e.message?.includes('NetworkError')
      ? ' — network error, check VPN/Tailscale'
      : '';
    appendLog(createLogEntry('error', 'debug', `API failed: ${e.message}${detail}`));
    showToast('API test failed' + detail, 'error');
  }
});

// --- Voice input (Web Speech API) ---

let recognition = null;
let isRecording = false;
let accumulatedSpeech = []; // persists across recognition restarts

function initSpeech() {
  const SpeechRecognition = window.SpeechRecognition || window.webkitSpeechRecognition;
  if (!SpeechRecognition) {
    micBtn.classList.add('unsupported');
    return;
  }

  recognition = new SpeechRecognition();
  recognition.continuous = true;
  recognition.interimResults = true;
  recognition.lang = 'en-US';

  recognition.onresult = (e) => {
    // The results array contains one entry that evolves from interim → final.
    // We only care about the latest transcript (interim or final).
    const last = e.results[e.results.length - 1];
    const text = last[0].transcript.trim();
    const conf = (last[0].confidence * 100).toFixed(0);
    const isFinal = last.isFinal;

    if (isFinal) {
      appendLog(createLogEntry('ok', 'mic', `"${text}" (${conf}%)`));
    }

    // Show accumulated (from prior restarts) + current session text.
    const full = [...accumulatedSpeech, text].filter(Boolean).join(' ');
    cmdEl.value = full;

    // Auto-send on terminator keyword.
    const lower = full.toLowerCase().trim();
    const terminators = ['over', 'done', 'send it', 'finish', 'end'];
    if (isFinal && terminators.some(t => lower.endsWith(t))) {
      appendLog(createLogEntry('sent', 'mic', `Sending: "${full}"`));
      sendCommand();
      stopRecording();
    }
  };

  recognition.onerror = (e) => {
    appendLog(createLogEntry('error', 'mic', `Speech error: ${e.error}`));
    if (e.error !== 'no-speech' && e.error !== 'aborted') {
      stopRecording();
    }
  };

  recognition.onend = () => {
    if (isRecording) {
      // Save the last final from the session that just ended.
      if (recognition._lastFinal) {
        accumulatedSpeech.push(recognition._lastFinal);
        recognition._lastFinal = null;
      }
      // Restart — browser stops recognition after silence, but we want to
      // keep listening until user clicks mic again or says a terminator.
      try { recognition.start(); } catch {}
    }
  };

  // Capture last final text before onend fires (results array gets cleared).
  recognition.addEventListener('result', (e) => {
    for (let i = 0; i < e.results.length; i++) {
      if (e.results[i].isFinal) {
        recognition._lastFinal = e.results[i][0].transcript.trim();
      }
    }
  });
}

function toggleRecording() {
  if (isRecording) {
    stopRecording();
  } else {
    startRecording();
  }
}

function startRecording() {
  if (!recognition) return;
  isRecording = true;
  accumulatedSpeech = [];
  micBtn.classList.add('recording');
  cmdEl.placeholder = 'Listening... say "over" when done';
  cmdEl.value = '';
  try { recognition.start(); } catch {}
}

function stopRecording() {
  isRecording = false;
  accumulatedSpeech = [];
  micBtn.classList.remove('recording');
  cmdEl.placeholder = 'run cargo test';
  if (recognition) {
    try { recognition.stop(); } catch {}
  }
}

// --- Event listeners ---

sendBtn.addEventListener('click', sendCommand);
cmdEl.addEventListener('keydown', (e) => {
  if (e.key === 'Enter') sendCommand();
});
micBtn.addEventListener('click', toggleRecording);

// --- Workflow panel ---

const workflowPanel = document.getElementById('workflow-panel');
const escalationBanner = document.getElementById('escalation-banner');
const escalationText = document.getElementById('escalation-text');
const activeWorkflows = {};

function updateWorkflowPanel(event) {
  const id = event.workflow_id || event.workflow;

  if (event.type === 'step_start') {
    if (!activeWorkflows[id]) {
      activeWorkflows[id] = { name: event.workflow, steps: {}, done: false };
    }
    activeWorkflows[id].steps[event.step] = 'running';
  } else if (event.type === 'step_complete') {
    if (activeWorkflows[id]) {
      activeWorkflows[id].steps[event.step] = event.passed ? 'pass' : 'fail';
    }
  } else if (event.type === 'workflow_complete') {
    if (activeWorkflows[id]) {
      activeWorkflows[id].done = true;
      activeWorkflows[id].status = event.status;
      activeWorkflows[id].summary = event.summary;
    }
    // Remove completed workflows after 10s
    setTimeout(() => {
      delete activeWorkflows[id];
      renderWorkflowPanel();
    }, 10000);
  }
  renderWorkflowPanel();
}

function renderWorkflowPanel() {
  workflowPanel.innerHTML = '';
  for (const [id, wf] of Object.entries(activeWorkflows)) {
    const div = document.createElement('div');
    div.className = 'workflow-run';
    let html = `<div class="wf-title">${escapeHtml(wf.name)}</div>`;
    for (const [step, state] of Object.entries(wf.steps)) {
      const icon = state === 'running' ? '...' : state === 'pass' ? '\u2713' : '\u2717';
      html += `<div class="workflow-step ${state}"><span class="step-icon">${icon}</span>${escapeHtml(step)}</div>`;
    }
    if (wf.done && wf.summary) {
      html += `<div class="wf-summary ${wf.status || ''}">${escapeHtml(wf.summary)}</div>`;
    }
    div.innerHTML = html;
    workflowPanel.appendChild(div);
  }
}

function showEscalation(esc) {
  escalationText.textContent = `${esc.workflow}/${esc.step} \u2014 ${esc.feedback || esc.reason || 'Unknown'}`;
  escalationBanner.classList.add('visible');
}

function dismissEscalation() {
  escalationBanner.classList.remove('visible');
}

// --- Session selector ---

const sessionSelect = document.getElementById('session-select');
const btnStart = document.getElementById('btn-start');
const btnStop = document.getElementById('btn-stop');
let currentSession = '';

async function loadSessions() {
  try {
    const resp = await fetch('/api/sessions');
    const data = await resp.json();
    sessionSelect.innerHTML = '';

    // Active sessions
    if (data.sessions && data.sessions.length > 0) {
      const group = document.createElement('optgroup');
      group.label = 'Active Sessions';
      data.sessions.forEach(s => {
        const opt = document.createElement('option');
        opt.value = s.name;
        const status = s.attached ? ' (attached)' : '';
        const layout = s.layout === 'claude' ? ' [claude+shell]' : '';
        opt.textContent = `${s.name}${layout}${status}`;
        group.appendChild(opt);
      });
      sessionSelect.appendChild(group);
    }

    // Available projects
    if (data.projects && data.projects.length > 0) {
      const group = document.createElement('optgroup');
      group.label = 'Available Projects';
      data.projects.forEach(p => {
        const opt = document.createElement('option');
        opt.value = `project:${p.name}`;
        opt.textContent = `${p.name} (not started)`;
        group.appendChild(opt);
      });
      sessionSelect.appendChild(group);
    }

    // Select first active session by default
    if (data.sessions && data.sessions.length > 0) {
      // Preserve current selection if still valid
      const prev = currentSession;
      const stillExists = data.sessions.some(s => s.name === prev);
      if (stillExists) {
        sessionSelect.value = prev;
      } else {
        sessionSelect.value = data.sessions[0].name;
        switchSession(data.sessions[0].name);
      }
    }
    updateButtons();
  } catch (e) {
    sessionSelect.innerHTML = '<option value="">Failed to load sessions</option>';
    appendLog(createLogEntry('error', 'api', `Sessions fetch error: ${e.message}`));
  }
}

function switchSession(name) {
  currentSession = name;
  const host = window.location.hostname || 'localhost';
  const pageProto = window.location.protocol === 'https:' ? 'https' : 'http';
  // Reload iframe to trigger a new ttyd connection (reads updated state file).
  // Cache-bust with timestamp to force reconnect.
  terminalIframe.src = `${pageProto}://${host}:${TTYD_PORT}?t=${Date.now()}`;
}

function updateButtons() {
  const val = sessionSelect.value;
  const isProject = val.startsWith('project:');
  const isSession = val && !isProject;
  btnStart.disabled = !isProject;
  btnStop.disabled = !isSession;
  document.getElementById('btn-send').disabled = !isSession;
}

// --- Session send popup ---

const sendOverlay = document.getElementById('session-send-overlay');
const sendTarget = document.getElementById('session-send-target');
const sendText = document.getElementById('session-send-text');
const sendOk = document.getElementById('session-send-ok');
const sendCancel = document.getElementById('session-send-cancel');

function openSendPopup() {
  const session = sessionSelect.value;
  if (!session || session.startsWith('project:')) return;
  sendTarget.textContent = session;
  sendText.value = '';
  sendOverlay.style.display = 'flex';
  sendText.focus();
}

function closeSendPopup() {
  sendOverlay.style.display = 'none';
}

sendCancel.addEventListener('click', closeSendPopup);
sendOverlay.addEventListener('click', (e) => {
  if (e.target === sendOverlay) closeSendPopup();
});
sendText.addEventListener('keydown', (e) => {
  e.stopPropagation();
  if (e.key === 'Enter' && (e.ctrlKey || e.metaKey)) {
    e.preventDefault();
    sendOk.click();
  }
});

sendOk.addEventListener('click', async () => {
  const text = sendText.value.trim();
  const session = sendTarget.textContent;
  if (!text || !session) {
    showToast('No message or session selected', 'warn');
    return;
  }
  closeSendPopup();
  try {
    const resp = await fetch(`/api/sessions/${encodeURIComponent(session)}/panes/1.1/keys`, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ keys: text + '\n' }),
    });
    if (!resp.ok) {
      const err = await resp.text().catch(() => '');
      throw new Error(`${resp.status}: ${err}`);
    }
    appendLog(createLogEntry('sent', 'direct', `to ${session}: sent`));
    showToast(`Sent to ${session}`, 'ok');
  } catch (e) {
    showToast(`Send failed: ${e.message}`, 'error');
  }
});

document.getElementById('btn-send').addEventListener('click', openSendPopup);

sessionSelect.addEventListener('change', async () => {
  updateButtons();
  const val = sessionSelect.value;
  if (!val.startsWith('project:') && val) {
    try {
      await fetch(`/api/sessions/switch?session=${encodeURIComponent(val)}`, { method: 'POST' });
      appendLog(createLogEntry('ok', 'session', `Switched terminal to: ${val}`));
      switchSession(val);
    } catch (e) {
      appendLog(createLogEntry('error', 'session', `Failed to switch: ${e}`));
    }
  }
});

btnStart.addEventListener('click', async () => {
  const val = sessionSelect.value;
  if (!val.startsWith('project:')) return;
  const project = val.slice(8);
  btnStart.disabled = true;
  btnStart.textContent = '...';
  try {
    const resp = await fetch(`/api/sessions/start?project=${encodeURIComponent(project)}`, { method: 'POST' });
    const data = await resp.json();
    if (data.error) {
      appendLog(createLogEntry('error', 'session', data.error));
    } else {
      appendLog(createLogEntry('ok', 'session', `Started: ${project}`));
      // Switch to the new session and refresh the list
      await fetch(`/api/sessions/switch?session=${encodeURIComponent(project)}`, { method: 'POST' });
      switchSession(project);
      await loadSessions();
      sessionSelect.value = project;
      updateButtons();
    }
  } catch (e) {
    appendLog(createLogEntry('error', 'session', `Failed to start: ${e}`));
  }
  btnStart.textContent = 'Start';
});

btnStop.addEventListener('click', async () => {
  const session = sessionSelect.value;
  if (!session || session.startsWith('project:')) return;
  btnStop.disabled = true;
  btnStop.textContent = '...';
  try {
    const resp = await fetch(`/api/sessions/stop?session=${encodeURIComponent(session)}`, { method: 'POST' });
    const data = await resp.json();
    if (data.error) {
      appendLog(createLogEntry('error', 'session', data.error));
    } else {
      appendLog(createLogEntry('ok', 'session', `Stopped: ${session}`));
      await loadSessions();
      updateButtons();
    }
  } catch (e) {
    appendLog(createLogEntry('error', 'session', `Failed to stop: ${e}`));
  }
  btnStop.textContent = 'Stop';
});

// Refresh sessions periodically
setInterval(loadSessions, 30000);

// --- Init ---

initSpeech();
connect();
loadSessions();
renderDebugConfig();

// PWA service worker
if ('serviceWorker' in navigator) {
  navigator.serviceWorker.register('/sw.js').catch(() => {});
}
</script>
